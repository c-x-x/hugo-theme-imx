<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title id="title">IMX 雪花标志</title>
  <defs>
    <linearGradient id="glass" x1="22" y1="16" x2="105" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".62"/>
      <stop offset=".42" stop-color="#d9f6ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity=".16"/>
    </linearGradient>
    <linearGradient id="edge" x1="28" y1="17" x2="99" y2="109" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fdff"/>
      <stop offset=".3" stop-color="#8be8ff"/>
      <stop offset=".7" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="flake" x1="43" y1="28" x2="85" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".34" stop-color="#9eeaff"/>
      <stop offset=".72" stop-color="#3184e8"/>
      <stop offset="1" stop-color="#6d5de7"/>
    </linearGradient>
    <filter id="shadow" x="-24%" y="-24%" width="148%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0b3d76" flood-opacity=".18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path
      d="M64 8 109 34v60l-45 26-45-26V34z"
