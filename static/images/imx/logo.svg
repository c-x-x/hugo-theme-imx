      fill-opacity=".46"
      stroke="url(#edge)"
      stroke-width="2.5"/>
    <path d="m64 55 8 5-8 5-8-5z" fill="#ffffff" fill-opacity=".7"/>
    <path d="m64 65 8-5v9l-8 5z" fill="#3b82f6" fill-opacity=".32"/>
