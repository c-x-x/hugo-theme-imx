      stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M64 24v80"/>
      <path d="M64 24v80" transform="rotate(60 64 64)"/>
      <path d="M64 24v80" transform="rotate(120 64 64)"/>
    </g>

    <g
      fill="none"
      stroke="url(#flake)"
      stroke-width="3.75"
      stroke-linecap="round"
      stroke-linejoin="round">
      <path d="m64 38-10 10m10-10 10 10M64 90 54 80m10 10 10-10"/>
      <path
        d="m64 38-10 10m10-10 10 10M64 90 54 80m10 10 10-10"
        transform="rotate(60 64 64)"/>
      <path
        d="m64 38-10 10m10-10 10 10M64 90 54 80m10 10 10-10"
        transform="rotate(120 64 64)"/>
    </g>

    <path
      d="m64 51 12 7v13l-12 7-12-7V58z"
