name: Bug 报告
description: 报告可以复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请先删除配置中的令牌、邮箱和其他敏感信息。
  - type: input
    id: hugo-version
    attributes:
      label: Hugo 版本
      placeholder: hugo v0.163.1+extended
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: 浏览器与系统
      placeholder: Chrome 版本 / macOS、Windows 或 Linux
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 请说明实际结果和影响范围。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: 相关配置或最小仓库
      description: 只提供复现所需内容。
  - type: textarea
    id: logs
    attributes:
      label: 控制台或构建日志
      description: 如有，请粘贴与问题直接相关的部分。
