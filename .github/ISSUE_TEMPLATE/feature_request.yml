name: 功能建议
description: 提议一个适用于通用主题的能力
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 这个功能解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: dropdown
    id: breaking
    attributes:
      label: 是否可能影响现有配置？
      options:
        - 否
        - 是
        - 不确定
    validations:
      required: true
