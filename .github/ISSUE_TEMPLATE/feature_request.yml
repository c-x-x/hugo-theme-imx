name: 功能建议
description: 说明使用场景和期望行为
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 目前哪里不方便，谁会用到？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述结果，不要求提供实现细节。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: dropdown
    id: breaking
    attributes:
      label: 是否可能影响现有配置？
      options:
        - 否
        - 是
        - 不确定
    validations:
      required: true
