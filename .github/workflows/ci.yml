name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.20"
          cache: false

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.112.0"
          extended: true

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Show tool versions
        run: |
          go version
          hugo version
          node --version
          npm --version

      - name: Install test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Build example site
        run: npm run build:example

      - name: Verify generated pages
        run: |
          test -f /tmp/hugo-theme-imx-public/index.html
          test -f /tmp/hugo-theme-imx-public/posts/index.html
          test -f /tmp/hugo-theme-imx-public/posts/regression-long-article/index.html
          test -f /tmp/hugo-theme-imx-public/categories/index.html
          test -f /tmp/hugo-theme-imx-public/tags/index.html
          test -f /tmp/hugo-theme-imx-public/about/index.html
          test -f /tmp/hugo-theme-imx-public/404.html

      - name: Run browser regression tests
        run: npm run test:e2e

      - name: Verify test artifacts and repository output
        run: |
          test "$(find test-results -type f -name '*.png' | wc -l)" -eq 6
          test ! -d public
          test ! -d exampleSite/public

      - name: Upload regression screenshots
        if: ${{ always() && hashFiles('test-results/**/*.png') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: regression-screenshots
          path: test-results/**/*.png
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
