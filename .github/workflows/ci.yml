name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - hugo-version: "0.112.0"
            playwright: false
          - hugo-version: "0.164.0"
            playwright: true

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.20"
          cache: false

      - name: Set up Hugo Extended
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ matrix.hugo-version }}
          extended: true

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm

      - name: Show tool versions
        run: |
          go version
          hugo version
          node --version
          npm --version

      - name: Install test dependencies
        run: npm ci

      - name: Install Chromium
        if: matrix.playwright
        run: npx playwright install --with-deps chromium

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Verify strict build rejects missing artifacts
        run: npm run test:build-validation

      - name: Build and verify example site
        run: npm run build:example:strict

      - name: Run browser regression tests
        if: matrix.playwright
        run: npm run test:e2e

      - name: Verify repository output
        run: |
          test ! -d public
          test ! -d exampleSite/public

      - name: Verify browser regression screenshots
        if: matrix.playwright
        run: test "$(find test-results -type f -name '*.png' | wc -l)" -eq 6

      - name: Upload regression screenshots
        if: ${{ always() && hashFiles('test-results/**/*.png') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: regression-screenshots
          path: test-results/**/*.png
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
