baseURL = "http://example.org/"
defaultContentLanguage = "zh-cn"
locale = "zh-CN"
title = "IMX 示例站"
enableRobotsTXT = true

[params]
  description = "一个使用 Hugo Module 安装的 IMX Theme 中文示例站"
  subtitle = "记录技术、思考与持续发生的灵感"
  author = "IMX"
  keywords = ["Hugo", "博客", "技术", "开源主题"]
  avatar = "/images/imx/default-avatar.jpg"
  defaultImage = "/images/imx/default-cover.jpg"
  defaultOGImage = "/images/imx/default-og.jpg"
  favicon = "/images/imx/favicon.svg"
  mainSections = ["posts"]
  footerText = "IMX 示例站"

  [params.social]
    github = "https://github.com/c-x-x/hugo-theme-imx"

  [params.giscus]
    enabled = false
    repo = ""
    repoId = ""
    category = "Announcements"
    categoryId = ""
    mapping = "pathname"
    lang = "zh-CN"

[taxonomies]
  category = "categories"
  tag = "tags"

[[menus.main]]
  name = "首页"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "文章"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "分类"
  url = "/categories/"
  weight = 30

[[menus.main]]
  name = "标签"
  url = "/tags/"
  weight = 40

[[menus.main]]
  name = "关于"
  pageRef = "/about"
  weight = 50

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "dracula"
    tabWidth = 4

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = false

  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

[module]
  [[module.imports]]
    path = "github.com/c-x-x/hugo-theme-imx"
