baseURL = "http://example.org/"
defaultContentLanguage = "zh-cn"
locale = "zh-CN"
title = "IMX 示例站"
enableRobotsTXT = true

[params]
  description = "IMX 主题的中文示例站，展示安装、写作和常用配置。"
  subtitle = "写技术，也记录思路如何成形"
  author = "IMX"
  keywords = ["Hugo", "博客", "技术", "开源主题"]
  logo = "/images/imx/logo.svg"
  logoDark = "/images/imx/logo-dark.svg"
  avatar = "/images/imx/default-avatar.jpg"
  defaultImage = "/images/imx/default-cover.jpg"
  defaultOGImage = "/images/imx/default-og.jpg"
  favicon = "/images/imx/favicon.svg"
  faviconDark = "/images/imx/favicon-dark.svg"
  mainSections = ["posts"]
  footerText = "IMX 示例站"

  [params.social]
    github = "https://github.com/c-x-x/hugo-theme-imx"

  [params.giscus]
    enabled = false
    repo = ""
    repoId = ""
    category = "Announcements"
    categoryId = ""
    mapping = "pathname"
    lang = "zh-CN"
    lightTheme = "light"
    darkTheme = "dark"

[taxonomies]
  category = "categories"
  tag = "tags"

[[menus.main]]
  name = "首页"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "文章"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "分类"
  url = "/categories/"
  weight = 30

[[menus.main]]
  name = "标签"
  url = "/tags/"
  weight = 40

[[menus.main]]
  name = "关于"
  pageRef = "/about"
  weight = 50

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "dracula"
    tabWidth = 4

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = false

  [markup.goldmark.renderer]
    unsafe = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.112.0"

  [[module.imports]]
    path = "github.com/c-x-x/hugo-theme-imx"
