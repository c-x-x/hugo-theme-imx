{{ with .Site.Params.giscus }}
{{ if .enabled }}
<section class="comments-section" id="comments" aria-labelledby="comments-title">
  <div class="comments-container">
    <h2 class="section-title comments-title" id="comments-title">评论</h2>
    <div class="comments-wrapper">
      <div
        class="giscus-host"
        data-repo="{{ .repo }}"
        data-repo-id="{{ .repoId }}"
        data-category="{{ .category }}"
        data-category-id="{{ .categoryId }}"
        data-mapping="{{ .mapping | default "pathname" }}"
        data-lang="{{ .lang | default "zh-CN" }}"
        data-light-theme="{{ .lightTheme | default "light" }}"
        data-dark-theme="{{ .darkTheme | default "dark" }}">
      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    const host = document.querySelector('.giscus-host');
    if (!host) return;

    const root = document.documentElement;
    const themeForPage = () => (
      root.dataset.theme === 'dark'
        ? host.dataset.darkTheme
        : host.dataset.lightTheme
    );

    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.async = true;
    script.crossOrigin = 'anonymous';
    script.dataset.repo = host.dataset.repo;
    script.dataset.repoId = host.dataset.repoId;
    script.dataset.category = host.dataset.category;
    script.dataset.categoryId = host.dataset.categoryId;
    script.dataset.mapping = host.dataset.mapping;
    script.dataset.strict = '0';
    script.dataset.reactionsEnabled = '1';
    script.dataset.emitMetadata = '0';
    script.dataset.inputPosition = 'top';
    script.dataset.theme = themeForPage();
    script.dataset.lang = host.dataset.lang;
    script.dataset.loading = 'lazy';
    host.appendChild(script);

    let lastTheme = script.dataset.theme;
    host.dataset.currentTheme = lastTheme;

    function syncGiscusTheme() {
      const nextTheme = themeForPage();
      host.dataset.currentTheme = nextTheme;
      if (nextTheme === lastTheme) return;

      const frame = document.querySelector('iframe.giscus-frame');
      if (!frame) return;

      frame.contentWindow.postMessage(
        {
          giscus: {
            setConfig: {
              theme: nextTheme
            }
          }
        },
        'https://giscus.app'
      );
      lastTheme = nextTheme;
    }

    new MutationObserver(syncGiscusTheme).observe(root, {
      attributes: true,
      attributeFilter: ['data-theme']
    });

    window.addEventListener('message', (event) => {
      if (event.origin === 'https://giscus.app') {
        syncGiscusTheme();
      }
    });
  }());
</script>
{{ end }}
{{ end }}
